<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0d0c0b"/>
  <!-- beam -->
  <rect x="15" y="7" width="2" height="18" rx="1" fill="#c9a84c"/>
  <!-- crossbar -->
  <rect x="6" y="10" width="20" height="2" rx="1" fill="#c9a84c"/>
  <!-- left pan strings -->
  <line x1="8" y1="12" x2="8" y2="17" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- right pan strings -->
  <line x1="24" y1="12" x2="24" y2="17" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- left pan -->
  <path d="M5 17 Q8 21 11 17" stroke="#c9a84c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- right pan (slightly lower = tipped) -->
  <path d="M21 19 Q24 23 27 19" stroke="#c9a84c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- base -->
  <rect x="13" y="24" width="6" height="2" rx="1" fill="#c9a84c"/>
</svg>
